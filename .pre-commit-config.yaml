default_language_version:
  python: python3.11
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
    - id: vulture
      args: ["--min-confidence", "70", "backend", "utils", "app.py", "pages"]
 
  - repo: https://github.com/PyCQA/pylint
    rev: v3.2.0
    hooks:
      - id: pylint
        args: ["--disable=C0114,C0116"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        args: ["--py310-plus"]

  # ✅ FIXED SEMGREP (correct repo)
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: python scripts/run_semgrep.py
        language: system
        pass_filenames: false
